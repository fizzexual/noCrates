# ==========================================================
#  Example CHEST HUNT: opening spawns a grid of chests around
#  you and you pick only a few. Stand in an open, flat area.
# ==========================================================

display-name: "<gradient:#ffd34d:#ff7a18><bold>Treasure Hunt</bold></gradient>"

animation: chesthunt

chesthunt:
  chests: 8            # how many chests spawn
  picks: 4             # how many you may open
  radius: 2            # 2 -> a 5x5 area around you
  timeout-seconds: 30  # auto-ends and cleans up after this

key:
  type: both
  id: treasure
  item:
    material: MAP
    name: "<gold><bold>Treasure Map"
    glow: true

settings:
  broadcast: true
  cooldown-seconds: 0

rewards:
  coins:
    rarity: common
    chance: 45.0
    display: { material: GOLD_NUGGET, name: "<yellow>$250" }
    actions:
      - "money: 250"
  gapple:
    rarity: uncommon
    chance: 30.0
    display: { material: GOLDEN_APPLE, name: "<gold>Golden Apple" }
    actions:
      - "item: GOLDEN_APPLE 2"
  diamond-block:
    rarity: rare
    chance: 18.0
    display: { material: DIAMOND_BLOCK, name: "<aqua>Diamond Block" }
    actions:
      - "item: DIAMOND_BLOCK 1"
  netherite:
    rarity: epic
    chance: 6.0
    display: { material: NETHERITE_INGOT, name: "<light_purple>Netherite Ingot" }
    actions:
      - "item: NETHERITE_INGOT 1"
  legendary-loot:
    rarity: legendary
    chance: 1.0
    display: { material: NETHER_STAR, name: "<gold><bold>Legendary Loot", glow: true }
    actions:
      - "broadcast: <gold><player> <yellow>struck legendary treasure!"
      - "firework: true"
      - "item: NETHERITE_BLOCK 1"
