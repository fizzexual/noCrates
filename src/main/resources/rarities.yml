# ==========================================================
#  noCrates rarities. Colours use MiniMessage.
#  broadcast: announce wins of this tier to the whole server.
# ==========================================================

rarities:
  common:
    color: "<white>"
    order: 1
    broadcast: false
  uncommon:
    color: "<green>"
    order: 2
    broadcast: false
  rare:
    color: "<aqua>"
    order: 3
    broadcast: true
  epic:
    color: "<light_purple>"
    order: 4
    broadcast: true
  legendary:
    color: "<gradient:#ffd34d:#ff7a18><bold>"
    order: 5
    broadcast: true
  mythic:
    color: "<gradient:#ff4d6d:#c77dff><bold>"
    order: 6
    broadcast: true
